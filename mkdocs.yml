site_name: Game Export Pipeline Documentation
site_description: One-click FBX export for Blender 4.2+ — validation, collision generation, engine presets, and auto-fix tools for Unity, Unreal Engine, and Godot.
site_author: Mantis3de
site_url: https://mantis3de.github.io/game-export-pipeline/

edit_uri: ""

copyright: Copyright &copy; Mantis3de — Game Export Pipeline

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mantis3de
      name: Mantis3de on GitHub
    - icon: material/web
      link: https://mantis3de.carrd.co
      name: Mantis3de
  generator: false

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start (5 Minutes): getting-started/quick-start.md
      - Core Concepts: getting-started/concepts.md
  - The Asset Preflight Window: window.md
  - Features:
      - Budgets & Dashboard: features/budgets.md
      - Validation Rules (Presets): features/profiles.md
      - Specification Editor: features/specification-editor.md
      - Naming Templates: features/naming.md
      - LOD Tools: features/lod.md
      - Batch Scan & HTML Report: features/batch-scan.md
      - Release Gate & Regressions: features/release-gate.md
      - Headless CLI (CI Gate): features/cli.md
      - Bug Reporting & Diagnostics: features/bug-reporting.md
  - Viewport Tools:
      - Export (Output & Engine): panels/output.md
      - Individual Steps: panels/individual-steps.md
      - Collision Setup: panels/collision-setup.md
      - Scene Organization: panels/scene-organization.md
  - Reference:
      - Validation Checks: reference/validation-checks.md
      - Collider Naming: reference/collider-naming.md
      - Profiles Reference: reference/profiles-reference.md
      - Engine Presets: reference/engine-presets.md
      - Report Schema: reference/report-schema.md
  - Workflows:
      - Validate a Scene Asset: workflows/scene-asset.md
      - Batch + Team Report: workflows/batch-team.md
      - CI Gate: workflows/ci-gate.md
  - Developers:
      - Architecture: architecture.md
      - Python API: api.md
  - FAQ: faq.md
  - Changelog: changelog.md

# Redirect stubs for old/merged pages — kept so existing links/URLs still work,
# but intentionally left out of the navigation.
not_in_nav: |
  /panels/validation.md
  /panels/fix.md
  /panels/export.md
  /panels/fbx-tools.md
  /panels/quick-reset.md
  /reference/collision-naming.md
